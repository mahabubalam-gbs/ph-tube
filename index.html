<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Tube</title>
    <!-- daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .active {
            background: #ff1f3d;
            color: white;
        }
    </style>
</head>

<body>
    <header class="w-11/12 mx-auto py-8 border-b border-gray-300">
        <nav class="flex justify-between items-center">
            <div>
                <img class="w-[120px]" src="assets/Logo.png" alt="">
            </div>
            <div>
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search" />
                </label>
            </div>
            <div class="btn bg-red-500 text-white">
                Sort by View
            </div>
        </nav>
    </header>
    <nav id="category-container" class="flex py-10 justify-center gap-5">
        <button id="btn-all" onclick="loadVideos()" class="btn btn-sm hover:bg-red-500 hover:text-white">All</button>
    </nav>

    <section id="loader" class="text-center py-10 hidden">
        <span class="loading loading-ring loading-xl"></span>
    </section>
    <section id="video-container"
        class="w-11/12 pb-10 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="video_details" class="modal">
        <div class="modal-box">
            <div id="details-container">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn bg-red-500 text-white">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <script src="scripts/categories.js"></script>
    <script src="scripts/loader.js"></script>
    <script src="scripts/videos.js"></script>
    <script src="scripts/categoryVideos.js"></script>
    <script src="scripts/toggle.js"></script>
    <script src="scripts/videoDetails.js"></script>

</body>

</html>
